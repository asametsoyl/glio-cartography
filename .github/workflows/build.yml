name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          - os: macos-latest
            init-shell: bash
          - os: windows-latest
            init-shell: cmd.exe
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Setup Micromamba (Python Environment)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: glio-env
          create-args: >-
            python=3.10 scanpy squidpy pytorch torchvision fastapi uvicorn loguru pandas numpy scipy scikit-learn
          init-shell: ${{ matrix.init-shell }}

      - name: Install Extra Python Packages (macOS)
        if: runner.os == 'macOS'
        shell: bash -l {0}
        run: |
          pip install tangram-sc optuna
          
      - name: Install Extra Python Packages (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          pip install tangram-sc optuna
          
      - name: Bundle Python Env for Electron (macOS)
        if: runner.os == 'macOS'
        shell: bash -l {0}
        run: |
          mkdir -p desktop_app/python_env
          cp -R "$MAMBA_ROOT_PREFIX/envs/glio-env/"* desktop_app/python_env/
          
      - name: Bundle Python Env for Electron (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist desktop_app\python_env mkdir desktop_app\python_env
          xcopy /E /I /H /Y "%MAMBA_ROOT_PREFIX%\envs\glio-env\*" "desktop_app\python_env\"
          
      - name: Install NPM Dependencies
        working-directory: desktop_app
        run: npm install
        
      - name: Build Electron App (macOS)
        if: runner.os == 'macOS'
        working-directory: desktop_app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac
        
      - name: Build Electron App (Windows)
        if: runner.os == 'Windows'
        working-directory: desktop_app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win
        
      - name: Upload Application (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Glio-Cartography-${{ runner.os }}
          path: |
            desktop_app/dist/*.dmg
            desktop_app/dist/*.exe
            desktop_app/dist/*.zip
